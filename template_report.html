<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CyberScan Report</title>
  <style>
    @page {
      size: A4;
      margin: 18mm 14mm 18mm 14mm;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      color: #222;
      font-size: 12px;
      line-height: 1.6;
      background: #fff;
      overflow-wrap: break-word;
    }

    .container {
      max-width: 950px;
      margin: 0 auto;
      padding: 8px 10px;
    }

    .report-header {
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 2px solid #1f3b63;
      padding-bottom: 12px;
    }

    .report-header h1 {
      margin: 0;
      color: #1f3b63;
      font-size: 24px;
    }

    .report-header p {
      margin: 6px 0 0;
      color: #666;
      font-size: 12px;
    }

    h1, h2, h3, h4 {
      color: #1f3b63;
      page-break-after: avoid;
      break-after: avoid;
    }

    h1 {
      font-size: 22px;
      border-bottom: 2px solid #1f3b63;
      padding-bottom: 6px;
    }

    h2 {
      font-size: 18px;
      background: #f4f7fb;
      border-left: 5px solid #1f3b63;
      padding: 8px 10px;
      margin-top: 24px;
    }

    h3 {
      font-size: 15px;
      margin-top: 18px;
    }

    p {
      margin: 8px 0;
      text-align: justify;
      word-break: break-word;
      overflow-wrap: break-word;
    }

    ul, ol {
      margin: 8px 0 8px 22px;
    }

    li {
      margin-bottom: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      background: #fff;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
      page-break-inside: avoid;
      break-inside: avoid;
      table-layout: fixed;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
      vertical-align: top;
      font-size: 10px;
      word-break: normal;
      overflow-wrap: anywhere;
    }

    th {
      background: #34495e;
      color: white;
      font-size: 10px;
    }

    tr:nth-child(even) td {
      background: #fafafa;
    }

    code {
      background: #f3f3f3;
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 11px;
      font-family: Consolas, monospace;
    }

    pre {
      background: #f8f8f8;
      border: 1px solid #ddd;
      border-left: 4px solid #1f3b63;
      padding: 12px;
      border-radius: 4px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 11px;
      page-break-inside: avoid;
      break-inside: avoid;
    }

    pre code {
      background: transparent;
      padding: 0;
    }

    blockquote {
      border-left: 4px solid #1f3b63;
      padding: 10px 12px;
      color: #555;
      background: #f9f9f9;
      margin: 12px 0;
      page-break-inside: avoid;
      break-inside: avoid;
    }

    strong {
      color: #1f2f46;
    }

    hr {
      border: none;
      border-top: 1px solid #d9e1ea;
      margin: 20px 0;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 12px auto;
      page-break-inside: avoid;
    }

    .content h2:nth-of-type(1) {
      margin-top: 0;
    }

    .content table:nth-of-type(n+2) {
      font-size: 9px;
    }

    .footer-note {
      margin-top: 24px;
      text-align: center;
      color: #777;
      font-size: 10px;
      border-top: 1px solid #ddd;
      padding-top: 10px;
    }

    table, pre, blockquote {
      page-break-inside: avoid;
      break-inside: avoid;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="report-header">
      <h1>Vulnerability Assessment Report</h1>
      <p>Generated automatically from the markdown analysis report</p>
    </div>

    <div class="content">
      {{CONTENT}}
    </div>

    <div class="footer-note">
      CyberScan Report
    </div>
  </div>
</body>
</html>
